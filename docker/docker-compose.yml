# Central daemon compose file for the sidecar Docker model.
#
# This container does not mount source code. It only owns shared state/runtime
# volumes. Repo access happens through short-lived sidecars started by
# the host wrapper after `ccc init` authorizes a specific Git repo.

services:
  cocoindex-code-daemon:
    image: ${COCOINDEX_CODE_IMAGE:-cocoindex-code:local-layered}
    container_name: ${COCOINDEX_CODE_DAEMON_CONTAINER:-cocoindex-code-local-daemon}
    volumes:
      - ${COCOINDEX_CODE_HOST_SETTINGS_DIR:-${HOME}/.cocoindex_code}:/home/coco/.cocoindex_code
      - cocoindex-code-local-state:/var/cocoindex
      - cocoindex-code-local-runtime:/var/run/cocoindex_code
    environment:
      COCOINDEX_CODE_DAEMON_TCP: 0.0.0.0:8765
      COCOINDEX_CODE_DIR: /home/coco/.cocoindex_code
      COCOINDEX_CODE_STATE_DIR: /var/cocoindex/state
      COCOINDEX_CODE_RUNTIME_DIR: /var/run/cocoindex_code
      COCOINDEX_CODE_DB_PATH_MAPPING: /workspace=/var/cocoindex/db
      COCOINDEX_CODE_DAEMON_SUPERVISED: "1"
      PUID: ${PUID:-}
      PGID: ${PGID:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ccc daemon status >/dev/null 2>&1 || test -S /var/run/cocoindex_code/daemon.sock",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - cocoindex-code-local

volumes:
  cocoindex-code-local-state:
    name: ${COCOINDEX_CODE_STATE_VOLUME:-cocoindex-code-local-state}
    external: true
  cocoindex-code-local-runtime:
    name: ${COCOINDEX_CODE_RUNTIME_VOLUME:-cocoindex-code-local-runtime}
    external: true

networks:
  cocoindex-code-local:
    name: cocoindex-code-local
