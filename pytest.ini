[pytest]
addopts = -q
testpaths = tests
asyncio_mode = auto
markers =
    integration: mark test as integration/end-to-end (skipped by default)
    network: mark test as requiring network access (skipped by default)
    slow: mark test as slow (skipped by default)
    e2e: mark test as an end-to-end test (skipped by default)
    docker_e2e: requires Docker; builds the image and runs containerized E2E tests

# Note: by default, e2e/integration tests are skipped via tests/conftest.py
# to make the test run fast. Set RUN_SLOW_TESTS=1 to run all tests (including e2e).
